# Hermes Agent Java - Default Configuration

model:
  provider: openrouter
  model: anthropic/claude-3.5-sonnet
  # api_key: Set via OPENROUTER_API_KEY env var
  # base_url: Optional override

agent:
  max_turns: 90
  gateway_timeout: 300
  gateway_timeout_warning: 60
  restart_drain_timeout: 30

tools:
  enabled:
    - web_search
    - terminal
    - file_operations
  # disabled: []

display:
  busy_input_mode: queue
  # spinner: dots

timezone: Asia/Shanghai

# Gateway configuration
gateway:
  enabled_platforms: []
  # - telegram
  # - discord
  # - feishu

# Terminal configuration
terminal:
  backend: local
  timeout: 300
  # docker_image: hermes-agent:latest

# Memory configuration
memory:
  enabled: true
  # mode: local

# Skills configuration
skills:
  auto_create: true
  auto_update: true
