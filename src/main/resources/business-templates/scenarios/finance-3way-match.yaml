template_id: finance-3way-match
name: 三单匹配自动化
category: finance
status: STABLE
industry_tag: 财务
icon: layers
color: green

summary: PO + 收货单 + 发票三单自动匹配，月节省 200+ 工时
description: |
  把应付链路上最耗时的"对单"环节交给数字员工。
  应付会计 OCR 发票、对比 PO 和入库单、识别差异并拦截，
  合规通过的进入付款审批包，月底对账秒级完成。

metrics:
  - label: 月节省工时
    value: "200+"
  - label: 自动匹配率
    value: "94%"
  - label: 差异发现速度
    value: "T+0"

involved_agents:
  - template_id: finance-ap-specialist
    role_in_scenario: 三单匹配主角
  - template_id: finance-expense-auditor
    role_in_scenario: 合规校验
  - template_id: finance-gl-accountant
    role_in_scenario: 凭证生成
  - template_id: finance-fpa-analyst
    role_in_scenario: 成本归属

clone_blueprint:
  team:
    name: 应付自动化团队
    description: 三单匹配 + 合规审核 + 凭证 + 成本归属
  prompt_assets:
    - asset_id: 3way-match-rules
      name: 三单匹配规则
      purpose: 不一致情形与处理建议
      content: |
        ## 完全一致
        - 金额误差 < 1% 且数量一致 → 自动通过
        ## 数量不一致
        - 入库 < PO → 部分到货，挂账继续匹配
        - 入库 > PO → 阻断，需采购确认
        ## 金额不一致
        - 误差 1%-5% → 待审
        - 误差 > 5% → 阻断，附差异明细
        ## 发票真伪
        - 必须通过税局接口验真
  scenario:
    name: 三单匹配自动化
    description: 端到端应付链路自动化
    collaboration_pattern: SEQUENTIAL
    success_criteria:
      - 三单匹配率 ≥ 90%
      - 差异 T+0 暴露
      - 付款审批 100% 留痕

workflow_timeline:
  - t: T+0
    actor: 应付会计
    action: 接收发票（邮件/OCR/上传）
  - t: T+0+30s
    actor: 应付会计
    action: OCR 解析 → 真伪查验
  - t: T+0+1min
    actor: 应付会计
    action: 拉取对应 PO 与入库单
  - t: T+0+2min
    actor: 应付会计
    action: 三单匹配 + 差异分析
  - t: T+0+3min
    actor: 费控审单员
    action: 合规校验（税率/科目/部门归属）
  - t: T+0+5min
    actor: 应付会计
    action: 生成付款审批包，提交 CFO
  - t: T+1d
    actor: 总账会计
    action: 审批通过后生成凭证
  - t: 月末
    actor: FP&A
    action: 成本归属分析进入月报
