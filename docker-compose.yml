version: "3.8"

services:
  hermes:
    build:
      context: .
      dockerfile: Dockerfile
    image: hermes-agent-java:0.1.0-SNAPSHOT
    container_name: hermes-agent
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - HERMES_HOME=/data
      - HERMES_PORT=8080
      - HERMES_HOST=0.0.0.0
      - HERMES_PROFILE=production
      - JAVA_OPTS=-Xms512m -Xmx2g -XX:+UseG1GC -XX:+UseContainerSupport
    volumes:
      - hermes-data:/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    networks:
      - hermes-network

  # Optional: Prometheus for metrics collection
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: hermes-prometheus
  #   restart: unless-stopped
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus-data:/prometheus
  #   networks:
  #     - hermes-network

volumes:
  hermes-data:
    driver: local
  prometheus-data:
    driver: local

networks:
  hermes-network:
    driver: bridge
